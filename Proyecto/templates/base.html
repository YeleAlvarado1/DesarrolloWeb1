<!DOCTYPE html>
<html lang="es">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">    
<meta charset="UTF-8">
<title>JAZ Servicio Técnico</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="icon" type="image/png" href="{{ url_for('static', filename='img/Icono.png') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    

<div class="container">

<a class="navbar-brand" href="{{ url_for('index') }}"> <img src="{{ url_for('static', filename='img/Captura de pantalla 2025-12-11 150152.png') }}" alt="Logo JAZ" width="150" class="ms-2">
JAZ Servicio Técnico

</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link {% if request.path == url_for('index') %}active{% endif %}" href="{{ url_for('index') }}">
Inicio
</a>
</li>

<li class="nav-item">
<a class="nav-link {% if 'servicios' in request.path %}active{% endif %}" href="{{ url_for('servicios') }}">
Servicios
</a>
</li>

<li class="nav-item">
<a class="nav-link {% if 'clientes' in request.path %}active{% endif %}" href="{{ url_for('clientes') }}">
Clientes
</a>
</li>

<li class="nav-item">
<a class="nav-link {% if 'productos' in request.path %}active{% endif %}" href="{{ url_for('productos') }}">
Productos
</a>
</li>

<li class="nav-item">
<a class="nav-link {% if 'acerca' in request.path %}active{% endif %}" href="{{ url_for('acerca') }}">
Acerca
</a>
</li>
<li class="nav-item">
    <span class="nav-link">
        Hola {{ current_user.nombre }}
    </span>
</li>

<li class="nav-item">
<a class="nav-link" href="{{ url_for('logout') }}">
Cerrar sesión
</a>
</li>



</ul>

</div>
</div>
</nav>

<main class="container my-4 flex-grow-1">
{% block content %}
{% endblock %}
</main>

<footer class="bg-dark text-white text-center py-3 mt-auto">
© 2026 JAZ Servicio Técnico
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
