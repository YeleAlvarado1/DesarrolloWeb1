{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2>Productos</h2>

<a href="/productos/crear" class="btn btn-primary mb-3">
Agregar Producto
</a>

<form action="/reporte_productos" method="POST" class="form-reporte">
    <input type="date" name="fecha_inicio" required>
    <input type="date" name="fecha_fin" required>

    <button type="submit" class="btn-pdf">
         Descargar Reporte
    </button>
</form>

<table class="table table-striped">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

{% for p in productos %}
<tr>

<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>

<td>

<a href="/productos/editar/{{p[0]}}" class="btn btn-warning btn-sm">
Editar
</a>

<form action="{{ url_for('eliminar_producto_view', id=p[0]) }}" method="POST" 
      onsubmit="return confirmarEliminar({{ p[0] }})"
      style="display:inline;">

    <input type="hidden" name="motivo" id="motivo_{{ p[0] }}">

    <button type="submit" class="btn btn-danger btn-sm">
        Eliminar
    </button>
</form>

<!-- BOTÓN RESTAURAR -->
{% if p|length > 4 and p[4] == 'eliminado' %}
<a href="{{ url_for('restaurar_producto', id=p[0]) }}" 
   class="btn btn-success btn-sm">
   Restaurar
</a>
{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>
<script>
function confirmarEliminar(id) {
    let motivo = prompt("¿Por qué deseas eliminar este producto?");
    if (!motivo) {
        return false;
    }

    document.getElementById("motivo_" + id).value = motivo;

    return confirm("¿Seguro que quieres eliminar este producto?");
}
</script>

{% endblock %}
