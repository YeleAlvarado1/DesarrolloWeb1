{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2>Productos</h2>

<a href="/productos/crear" class="btn btn-primary mb-3">
Agregar Producto
</a>
<a href="/reporte" class="btn btn-primary mb-3">
Descargar PDF
</a>

<table class="table table-striped">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

{% for p in productos %}
<tr>

<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>

<td>

<a href="/productos/editar/{{p[0]}}" class="btn btn-warning btn-sm">
Editar
</a>

<a href="/productos/eliminar/{{p[0]}}" class="btn btn-danger btn-sm">
Eliminar
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
