{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2>Inventario de Productos</h2>

<a href="/productos/crear" class="btn btn-primary mb-3">
Agregar Producto
</a>

<table class="table table-striped">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

{% for p in productos %}

<tr>

<td>{{p.id}}</td>
<td>{{p.nombre}}</td>
<td>{{p.cantidad}}</td>
<td>{{p.precio}}</td>

<td>

<a href="/productos/editar/{{p.id}}" class="btn btn-warning btn-sm">
Editar
</a>

<a href="/productos/eliminar/{{p.id}}" class="btn btn-danger btn-sm">
Eliminar
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
