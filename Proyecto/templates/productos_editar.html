{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2>Editar Producto</h2>

<form method="POST">

<div class="mb-3">
<label>Nombre del producto</label>

<select name="nombre" class="form-select mb-3" required>
    {% for p in productos %}
        <option value="{{p[1]}}"
            {% if p[1] == producto[1] %} selected {% endif %}>
            {{p[1]}}
        </option>
    {% endfor %}
</select>
</div>

<div class="mb-3">
<label>Cantidad</label>
<input type="number" name="cantidad" value="{{ producto.cantidad }}" class="form-control">
</div>

<div class="mb-3">
<label>Precio</label>
<input type="number" step="0.01" name="precio" value="{{ producto.precio }}" class="form-control">
</div>

<button type="submit" class="btn btn-warning">
Actualizar Producto
</button>

</form>

</div>

{% endblock %}
